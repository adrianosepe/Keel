name: Publish .NET Package

on:
  workflow_call:
    inputs:
      project_path:
        description: Path to the .csproj to pack and publish
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Validate package version tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          package_id="$(dotnet msbuild "${{ inputs.project_path }}" -getProperty:PackageId)"
          package_version="$(dotnet msbuild "${{ inputs.project_path }}" -getProperty:Version)"
          expected_tag="${package_id}-v${package_version}"

          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match package version."
            echo "Expected tag: ${expected_tag}"
            exit 1
          fi

      - name: Restore project
        run: dotnet restore "${{ inputs.project_path }}"

      - name: Build project
        run: dotnet build "${{ inputs.project_path }}" --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Pack project
        run: dotnet pack "${{ inputs.project_path }}" --configuration Release --no-build --output "${{ github.workspace }}/artifacts"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.workflow }}-${{ github.run_number }}
          path: ${{ github.workspace }}/artifacts

      - name: Add GitHub Packages source
        run: dotnet nuget add source --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Publish package to GitHub Packages
        run: dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg" --source github --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
