name: Publish Keel.Infra.WebApi

on:
  workflow_dispatch:
  push:
    tags:
      - "Keel.Infra.WebApi-v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    uses: ./.github/workflows/publish-dotnet-package.yml
    with:
      project_path: src/Keel.Infra.WebApi/Keel.Infra.WebApi.csproj
    secrets: inherit
